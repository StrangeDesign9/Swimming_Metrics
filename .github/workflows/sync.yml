name: Sync Swim Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dashboard from Google Drive
        run: |
          FILE_ID="1ZaC_B1BrRSZw9cI2iFA8ZTuUpOkCf7el"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" -o index.html
          echo "Downloaded $(wc -c < index.html) bytes"

      - name: Commit and push if changed
        run: |
          git config user.name "Phelps Agent"
          git config user.email "phelps@swim.local"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes — already current"
          else
            git commit -m "Sync dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
